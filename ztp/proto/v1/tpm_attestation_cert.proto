syntax = "proto3";

package ntt.ztp.v1;

import "google/api/resource.proto";
import "goten-sdk/types/meta.proto";

option go_package = "github.com/cloudwan/edgelq-sdk/ztp/resources/v1/tpm_attestation_cert;tpm_attestation_cert";
option java_multiple_files = true;
option java_outer_classname = "TpmAttestationCertProto";
option java_package = "com.ntt.ztp.pb.v1";

// TpmAttestationCert Resource
message TpmAttestationCert {
  option (google.api.resource) = {
    type : "ztp.edgelq.com/TpmAttestationCert"
    pattern : "projects/{project}/tpmAttestationCerts/{tpm_attestation_cert}"
  };

  // Name of TpmAttestationCert
  // When creating a new instance, this field is optional and if not provided,
  // it will be generated automatically. Last ID segment must conform to the
  // following regex: [a-z][a-z0-9\\-]{0,28}[a-z0-9]
  string name = 1;

  // Metadata is an object with information like create, update and delete time
  // (for async deleted resources), has user labels/annotations, sharding
  // information, multi-region syncing information and may have non-schema
  // owners (useful for taking ownership of resources belonging to lower level
  // services by higher ones).
  goten.types.Meta metadata = 2;

  string display_name = 3;

  string manufacturer = 4;

  // Should be in the format "productname (sku)"
  string product_name = 5;

  // Deprecated: use tpm_manufacturer_ca_certs. Read as a fallback for certs
  // created before the array field existed.
  // TODO: reserve field 6 after staging+prod are upgraded and every cert has
  // tpm_manufacturer_ca_certs populated.
  string tpm_manufacturer_ca_cert = 6 [ deprecated = true ];

  string idevid_issuer_ca_cert = 7;

  string ldevid_issuer_ca_cert = 8;

  // PEM CA certificates for the TPM endorsement key (EK). One entry per TPM
  // chip vendor/CA that may ship in this product/SKU; the EK cert is accepted
  // if it chains to any of them. Each entry is a PEM cert or chain.
  repeated string tpm_manufacturer_ca_certs = 9;
}
